<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homiee 料金計算・領収書発行</title>
    <style>
        /* --- 画面表示用スタイル --- */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; line-height: 1.5; padding: 20px; background-color: #f0f4f8; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.1rem; text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; }
        .datetime-group { display: flex; gap: 5px; }
        input[type="date"], input[type="time"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        .option-box, .discount-box { background: #fff9f0; padding: 12px; border-radius: 6px; border: 1px solid #fbd38d; margin-bottom: 15px; }
        .discount-box { background: #e8f4fd; border-color: #b3d7f2; }
        .result-box { margin-top: 15px; padding: 15px; background: #fff5f5; border-radius: 8px; border: 1px solid #feb2b2; }
        .total-row { font-size: 1.8rem; font-weight: bold; color: #e53e3e; text-align: center; margin-bottom: 8px; }
        .detail { font-size: 0.85rem; color: #4a5568; line-height: 1.6; }
        .print-btn { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* --- 印刷エリア非表示 --- */
        #print-area { display: none; }

        /* --- 🖨️ 印刷用設定 (A5 縦向き) --- */
        @media print {
            @page { 
                size: A5 portrait; 
                margin: 15mm; /* 上下左右に15mmの余白を設定 */
            }
            body { background: white; padding: 0; margin: 0; color: #000; }
            .container, .print-btn { display: none !important; } /* 操作画面を隠す */
            
            #print-area { 
                display: block !important; 
                width: 100%; 
                font-size: 10.5pt;
            }
            .header-info { text-align: center; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 10px; }
            .header-title { font-size: 16pt; font-weight: bold; letter-spacing: 2px; }
            .date-row { text-align: right; margin-bottom: 20px; margin-top: 5px; }
            
            .message { margin: 15px 0; font-size: 10.5pt; line-height: 1.8; }

            .print-table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid #000; }
            .print-table th, .print-table td { border: 1px solid #000; padding: 8px; text-align: left; }
            .print-table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
            
            .total-section { font-size: 16pt; font-weight: bold; text-align: center; margin: 30px 0; border: 2px solid #000; padding: 12px; background-color: #fcfcfc; }
            
            /* 受領印を削除し、右寄せに配置 */
            .footer-info { 
                text-align: right; 
                margin-top: 50px; 
                font-size: 9pt; 
                line-height: 1.6; 
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Homiee 料金計算機</h1>
    
    <div class="form-group">
        <label>入室日時</label>
        <div class="datetime-group">
            <input type="date" id="startDate" onchange="calculate()">
            <input type="time" id="startTime" value="10:00" onchange="calculate()">
        </div>
    </div>
    <div class="form-group">
        <label>退室日時</label>
        <div class="datetime-group">
            <input type="date" id="endDate" onchange="calculate()">
            <input type="time" id="endTime" value="12:16" onchange="calculate()">
        </div>
    </div>
    <div class="form-group">
        <label>お子様の人数</label>
        <input type="number" id="childCount" value="1" min="1" onchange="calculate()">
    </div>

    <div class="option-box">
        <label>食事オプション</label>
        <div style="display:flex; flex-direction:column; gap:5px; font-size:0.85rem;">
            <label><input type="checkbox" class="meal-opt" value="550" onchange="calculate()"> 朝食 (¥550)</label>
            <label><input type="checkbox" class="meal-opt" value="880" onchange="calculate()"> 昼食 (¥880)</label>
            <label><input type="checkbox" class="meal-opt" value="880" onchange="calculate()"> 夕食 (¥880)</label>
        </div>
    </div>

    <div class="discount-box">
        <label style="display:flex; align-items:center; cursor:pointer; font-weight:bold; font-size:0.85rem;">
            <input type="checkbox" id="isRepeater" onchange="calculate()" style="margin-right:8px;">
            リピーター割引 (10%OFF・端数切捨)
        </label>
    </div>

    <div class="result-box">
        <div id="totalPrice" class="total-row">¥ 0</div>
        <div id="calcDetail" class="detail"></div>
    </div>

    <button class="print-btn" onclick="window.print()">領収書を印刷する (A5縦)</button>
</div>

<div id="print-area">
    <div class="header-info">
        <div class="header-title">領収書兼ご精算書</div>
    </div>

    <div class="date-row">日付：<span id="p-date"></span></div>

    <p class="message">
        この度はHomieeをご利用いただき、誠にありがとうございます。<br>
        下記内容にて、正に領収いたしました。
    </p>

    <table class="print-table">
        <thead>
            <tr><th style="width: 25%;">項目</th><th style="width: 50%;">詳細内容</th><th style="width: 25%;">金額</th></tr>
        </thead>
        <tbody>
            <tr><td>ご利用期間</td><td id="p-time-detail" style="font-size: 9pt;"></td><td>-</td></tr>
            <tr><td>ご利用時間</td><td id="p-duration"></td><td>-</td></tr>
            <tr><td>基本利用料</td><td>単価 × <span id="p-count"></span>名</td><td id="p-usage"></td></tr>
            <tr id="p-disc-row"><td>特別割引</td><td>リピーター割引(10%OFF)</td><td id="p-disc"></td></tr>
            <tr><td>オプション</td><td id="p-opt-list"></td><td id="p-opt"></td></tr>
        </tbody>
    </table>

    <div class="total-section">
        合計金額：<span id="p-total"></span> (税込)
    </div>

    <div class="footer-info">
        東京都中央区銀座7-15-18 銀ビル1階<br>
        TEL: 03-4400-2291<br>
        <strong>homiee (株式会社mommy daddy)</strong>
    </div>
</div>

<script>
// 初期日付の設定（今日）
const today = new Date().toISOString().split('T')[0];
document.getElementById('startDate').value = today;
document.getElementById('endDate').value = today;

function calculate() {
    const sD = document.getElementById('startDate').value, sT = document.getElementById('startTime').value;
    const eD = document.getElementById('endDate').value, eT = document.getElementById('endTime').value;
    if(!sD || !sT || !eD || !eT) return;

    const startObj = new Date(`${sD}T${sT}`), endObj = new Date(`${eD}T${eT}`);
    let rawDiff = Math.floor((endObj - startObj) / (1000 * 60));
    if (rawDiff < 0) return;

    let amari = rawDiff % 30;
    let calcMin = amari <= 15 ? rawDiff - amari : rawDiff + (30 - amari);
    
    const base2h = 8800, add30m = 1650, childCount = parseInt(document.getElementById('childCount').value) || 1;
    let singlePrice = calcMin <= 120 ? base2h : base2h + ((calcMin - 120) / 30) * add30m;
    let totalUsage = singlePrice * childCount;

    let discount = 0;
    if (document.getElementById('isRepeater').checked) {
        discount = Math.floor((totalUsage * 0.1) / 10) * 10;
    }
    
    let optPrice = 0, optNames = [];
    document.querySelectorAll('.meal-opt:checked').forEach(opt => {
        optPrice += parseInt(opt.value);
        // data-name属性があれば使う、なければvalueを使う
        optNames.push(opt.parentElement.innerText.split('(')[0].trim());
    });
    let totalOpt = optPrice * childCount;
    let finalTotal = (totalUsage - discount) + totalOpt;

    // 画面表示
    document.getElementById('totalPrice').innerText = `¥ ${finalTotal.toLocaleString()}`;
    document.getElementById('calcDetail').innerHTML = `${Math.floor(calcMin/60)}時間 ${calcMin%60}分 / 合計: ¥${finalTotal.toLocaleString()}`;

    // 印刷データのセット
    document.getElementById('p-date').innerText = eD.replace(/-/g, '/');
    document.getElementById('p-time-detail').innerText = `${sD.replace(/-/g, '/')} ${sT} ～ ${eD.replace(/-/g, '/')} ${eT}`;
    document.getElementById('p-duration').innerText = `${Math.floor(calcMin/60)}時間 ${calcMin%60}分`;
    document.getElementById('p-count').innerText = childCount;
    document.getElementById('p-usage').innerText = `¥${totalUsage.toLocaleString()}`;
    
    const discRow = document.getElementById('p-disc-row');
    if (discount > 0) {
        discRow.style.display = 'table-row';
        document.getElementById('p-disc').innerText = `-¥${discount.toLocaleString()}`;
    } else {
        discRow.style.display = 'none';
    }

    document.getElementById('p-opt-list').innerText = optNames.length > 0 ? optNames.join(', ') : 'なし';
    document.getElementById('p-opt').innerText = `¥${totalOpt.toLocaleString()}`;
    document.getElementById('p-total').innerText = `¥${finalTotal.toLocaleString()}`;
}
calculate();
</script>
</body>
</html>
